name: SmartBiz CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Laravel / PostgreSQL
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: smartbiz_test
          POSTGRES_USER: smartbiz
          POSTGRES_PASSWORD: smartbiz_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartbiz -d smartbiz_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: testing
      APP_KEY: base64:c21hcnRiaXotY2ktdGVzdC1rZXktMzItYnl0ZXMhISE=
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: smartbiz_test
      DB_USERNAME: smartbiz
      DB_PASSWORD: smartbiz_ci
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      REDIS_HOST: 127.0.0.1
      AI_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked files for secrets
        run: python3 scripts/security/scan_tracked_secrets.py
        working-directory: .

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
        working-directory: .

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, mbstring, pcntl, pdo_pgsql, pgsql, redis, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Load baseline schema and migrations
        run: php artisan migrate --force

      - name: Seed deterministic test foundation
        run: php artisan db:seed --class=Database\\Seeders\\FoundationSeeder --force

      - name: Run backend tests
        run: php artisan test

      - name: Composer security audit
        run: composer audit --locked

  frontend:
    name: Flutter analyze and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
