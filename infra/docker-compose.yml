##
## SmartBiz AI — Development Stack
## Services: PHP 8.4 + Nginx + PostgreSQL 16 + Redis 7
##

services:
  app:
    build:
      context: ..
      dockerfile: infra/php/Dockerfile
      target: development
    container_name: smartbiz_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
      - ../_architecture:/architecture:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartbiz

  nginx:
    image: nginx:1.27-alpine
    container_name: smartbiz_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www/html:ro
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - smartbiz

  postgres:
    image: postgres:16-alpine
    container_name: smartbiz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartbiz
      POSTGRES_USER: smartbiz
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartbiz_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../_architecture:/architecture:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbiz -d smartbiz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartbiz

  redis:
    image: redis:7-alpine
    container_name: smartbiz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartbiz

volumes:
  pgdata:
  redisdata:

networks:
  smartbiz:
    driver: bridge
