##
## SmartBiz AI — Phase 1 Development Stack
## Services: PHP 8.4 (app) + Nginx + PostgreSQL 16 + Redis 7
## Source: 2_backend_architecture.md §2
##

services:

  # --- PHP 8.4 Application ---
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: smartbiz_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
      - ../_architecture:/architecture:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartbiz

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    container_name: smartbiz_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../backend:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - smartbiz

  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16-alpine
    container_name: smartbiz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartbiz
      POSTGRES_USER: smartbiz
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartbiz_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../_architecture:/architecture:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smartbiz -d smartbiz" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartbiz

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    container_name: smartbiz_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smartbiz

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  smartbiz:
    driver: bridge
