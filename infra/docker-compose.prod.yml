##
## SmartBiz AI — Production Docker Compose
##
## All production commands must load three separate env files:
##   backend/.env.production          (control + tenant runtime)
##   infra/.env.production.owner      (migrations / restore only)
##   infra/.env.production.backup     (read-only backup identity)
##

x-app-common: &app-common
  build:
    context: ..
    dockerfile: infra/php/Dockerfile
    target: production
  image: smartbiz-app:${SMARTBIZ_IMAGE_TAG:-latest}
  env_file:
    - ../backend/.env.production
  environment:
    APP_ENV: production
    SMARTBIZ_CONTAINER_ROLE: application
  restart: unless-stopped
  init: true
  stop_grace_period: 30s
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - edge
    - backend
  volumes:
    - app_public_storage:/var/www/html/storage/app/public
    - app_private_storage:/var/www/html/storage/app/private
    - app_logs:/var/www/html/storage/logs
    - ${BACKUP_VOLUME_SOURCE:-backup_data}:${BACKUP_PATH:-/var/backups/smartbiz}:ro
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  app:
    <<: *app-common
    command: ["php-fpm", "-F"]
    healthcheck:
      test: ["CMD", "php", "-r", "$$s=@fsockopen('127.0.0.1',9000); exit($$s ? 0 : 1);"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${APP_MEMORY_LIMIT:-512m}
    cpus: ${APP_CPU_LIMIT:-1.0}

  nginx:
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
    image: smartbiz-nginx:${SMARTBIZ_IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    ports:
      - "${NGINX_PORT:-80}:8080"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - edge
    volumes:
      - app_public_storage:/var/www/html/storage/app/public:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/up >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    mem_limit: ${NGINX_MEMORY_LIMIT:-128m}
    cpus: ${NGINX_CPU_LIMIT:-0.50}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    <<: *app-common
    command:
      - /bin/sh
      - -lc
      - >-
        exec php artisan queue:work redis
        --queue="${REDIS_QUEUE:-default}"
        --sleep="${QUEUE_WORKER_SLEEP:-3}"
        --tries="${QUEUE_WORKER_TRIES:-3}"
        --backoff="${QUEUE_WORKER_BACKOFF:-60}"
        --timeout="${QUEUE_WORKER_TIMEOUT:-90}"
        --max-time="${QUEUE_WORKER_MAX_TIME:-3600}"
        --max-jobs="${QUEUE_WORKER_MAX_JOBS:-1000}"
        --memory="${QUEUE_WORKER_MEMORY:-256}"
        --no-interaction
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[a]rtisan queue:work'"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${WORKER_MEMORY_LIMIT:-384m}
    cpus: ${WORKER_CPU_LIMIT:-1.0}

  scheduler:
    <<: *app-common
    environment:
      APP_ENV: production
      SMARTBIZ_CONTAINER_ROLE: application-scheduler
      SMARTBIZ_SCHEDULER_MODE: application
    command: ["php", "artisan", "schedule:work", "--no-interaction"]
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[a]rtisan schedule:work'"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${SCHEDULER_MEMORY_LIMIT:-192m}
    cpus: ${SCHEDULER_CPU_LIMIT:-0.50}

  # Persistent backup scheduler: receives the read-only backup credential,
  # never the database owner credential.
  backup-scheduler:
    build:
      context: ..
      dockerfile: infra/php/Dockerfile
      target: production
    image: smartbiz-app:${SMARTBIZ_IMAGE_TAG:-latest}
    environment:
      APP_NAME: ${APP_NAME:-SmartBiz AI}
      APP_ENV: production
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?APP_URL is required}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      CACHE_STORE: redis
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
      DB_CONNECTION: pgsql_backup
      DB_BACKUP_HOST: ${DB_BACKUP_HOST:-postgres}
      DB_BACKUP_PORT: ${DB_BACKUP_PORT:-5432}
      DB_BACKUP_DATABASE: ${DB_BACKUP_DATABASE:?DB_BACKUP_DATABASE is required}
      DB_BACKUP_USERNAME: ${DB_BACKUP_USERNAME:?DB_BACKUP_USERNAME is required}
      DB_BACKUP_PASSWORD: ${DB_BACKUP_PASSWORD:?DB_BACKUP_PASSWORD is required}
      DB_BACKUP_SSLMODE: ${DB_BACKUP_SSLMODE:-prefer}
      BACKUP_DB_CONNECTION: pgsql_backup
      BACKUP_PATH: ${BACKUP_PATH:-/var/backups/smartbiz}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_MAX_AGE_HOURS: ${BACKUP_MAX_AGE_HOURS:-26}
      BACKUP_MIN_FREE_MB: ${BACKUP_MIN_FREE_MB:-1024}
      BACKUP_TIMEOUT_SECONDS: ${BACKUP_TIMEOUT_SECONDS:-1800}
      BACKUP_VERIFY_ARCHIVE: ${BACKUP_VERIFY_ARCHIVE:-true}
      BACKUP_MIRROR_DISK: ${BACKUP_MIRROR_DISK:-}
      BACKUP_MIRROR_PREFIX: ${BACKUP_MIRROR_PREFIX:-smartbiz}
      BACKUP_MIRROR_REQUIRED: ${BACKUP_MIRROR_REQUIRED:-false}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      SMARTBIZ_CONTAINER_ROLE: backup-scheduler
      SMARTBIZ_SCHEDULER_MODE: backup
    command: ["php", "artisan", "schedule:work", "--no-interaction"]
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - app_public_storage:/var/www/html/storage/app/public:ro
      - app_private_storage:/var/www/html/storage/app/private:ro
      - app_logs:/var/www/html/storage/logs
      - ${BACKUP_VOLUME_SOURCE:-backup_data}:${BACKUP_PATH:-/var/backups/smartbiz}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[a]rtisan schedule:work'"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${BACKUP_SCHEDULER_MEMORY_LIMIT:-192m}
    cpus: ${BACKUP_SCHEDULER_CPU_LIMIT:-0.50}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # One-off privileged operations container. It is never started by `up` and
  # exists only under the `operations` profile for bootstrap/migrate/restore.
  ops:
    build:
      context: ..
      dockerfile: infra/php/Dockerfile
      target: production
    image: smartbiz-app:${SMARTBIZ_IMAGE_TAG:-latest}
    profiles: ["operations"]
    env_file:
      - ../backend/.env.production
      - ./.env.production.owner
      - ./.env.production.backup
    environment:
      APP_ENV: production
      SMARTBIZ_CONTAINER_ROLE: operations
      SMARTBIZ_SCHEDULER_MODE: none
    command: ["php", "artisan", "about", "--only=environment"]
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - app_public_storage:/var/www/html/storage/app/public
      - app_private_storage:/var/www/html/storage/app/private
      - app_logs:/var/www/html/storage/logs
      - ${BACKUP_VOLUME_SOURCE:-backup_data}:${BACKUP_PATH:-/var/backups/smartbiz}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_OWNER_DATABASE:?DB_OWNER_DATABASE is required}
      POSTGRES_USER: ${DB_OWNER_USERNAME:?DB_OWNER_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_OWNER_PASSWORD:?DB_OWNER_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-768m}
    cpus: ${POSTGRES_CPU_LIMIT:-1.0}
    shm_size: ${POSTGRES_SHM_SIZE:-256m}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
    command:
      - /bin/sh
      - -lc
      - >-
        exec redis-server
        --requirepass "$$REDIS_PASSWORD"
        --appendonly yes
        --appendfsync everysec
        --maxmemory "$$REDIS_MAXMEMORY"
        --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    mem_limit: ${REDIS_MEMORY_LIMIT:-384m}
    cpus: ${REDIS_CPU_LIMIT:-0.75}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
  redisdata:
  app_public_storage:
  app_private_storage:
  app_logs:
  backup_data:

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true
