##
## SmartBiz AI — Production Docker Compose
## Services: app (PHP-FPM), nginx, postgres, redis, worker, scheduler
## Run from the project root with:
## docker compose --env-file backend/.env.production -f infra/docker-compose.prod.yml up -d
##

services:

  # --- PHP-FPM Application ---
  app:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        - PHP_ENV=production
    container_name: smartbiz_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=production
    networks:
      - smartbiz
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    container_name: smartbiz_nginx
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../backend/public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - smartbiz
    deploy:
      resources:
        limits:
          memory: 128M

  # --- Queue Worker ---
  worker:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        - PHP_ENV=production
    container_name: smartbiz_worker
    restart: always
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      php artisan queue:work redis
        --sleep=3
        --tries=3
        --backoff=60
        --max-time=3600
        --max-jobs=1000
        --memory=256
    environment:
      - APP_ENV=production
    networks:
      - smartbiz
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Task Scheduler ---
  scheduler:
    build:
      context: ./php
      dockerfile: Dockerfile
      args:
        - PHP_ENV=production
    container_name: smartbiz_scheduler
    restart: always
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: /bin/sh -c "while true; do php artisan schedule:run --verbose --no-interaction >> /var/www/html/storage/logs/scheduler.log 2>&1; sleep 60; done"
    environment:
      - APP_ENV=production
    networks:
      - smartbiz
    deploy:
      resources:
        limits:
          memory: 128M

  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16-alpine
    container_name: smartbiz_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-smartbiz}
      POSTGRES_USER: ${DB_USERNAME:-smartbiz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-smartbiz} -d ${DB_DATABASE:-smartbiz}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartbiz
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    container_name: smartbiz_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: /bin/sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping 2>/dev/null | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartbiz
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  smartbiz:
    driver: bridge
