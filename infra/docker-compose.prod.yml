##
## SmartBiz AI — Production Docker Compose
##
## Start with:
##   docker compose --env-file backend/.env.production \
##     -f infra/docker-compose.prod.yml up -d
##

x-app-common: &app-common
  build:
    context: ..
    dockerfile: infra/php/Dockerfile
    target: production
  image: smartbiz-app:${SMARTBIZ_IMAGE_TAG:-latest}
  env_file:
    - ../backend/.env.production
  environment:
    APP_ENV: production
  restart: unless-stopped
  init: true
  stop_grace_period: 30s
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - edge
    - backend
  volumes:
    - app_public_storage:/var/www/html/storage/app/public
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  app:
    <<: *app-common
    command: ["php-fpm", "-F"]
    healthcheck:
      test: ["CMD", "php", "-r", "$$s=@fsockopen('127.0.0.1',9000); exit($$s ? 0 : 1);"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${APP_MEMORY_LIMIT:-512m}
    cpus: ${APP_CPU_LIMIT:-1.0}

  nginx:
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
    image: smartbiz-nginx:${SMARTBIZ_IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    ports:
      - "${NGINX_PORT:-80}:8080"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - edge
    volumes:
      - app_public_storage:/var/www/html/storage/app/public:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/up >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    mem_limit: ${NGINX_MEMORY_LIMIT:-128m}
    cpus: ${NGINX_CPU_LIMIT:-0.50}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    <<: *app-common
    command:
      - /bin/sh
      - -lc
      - >-
        exec php artisan queue:work redis
        --queue="${REDIS_QUEUE:-default}"
        --sleep="${QUEUE_WORKER_SLEEP:-3}"
        --tries="${QUEUE_WORKER_TRIES:-3}"
        --backoff="${QUEUE_WORKER_BACKOFF:-60}"
        --timeout="${QUEUE_WORKER_TIMEOUT:-90}"
        --max-time="${QUEUE_WORKER_MAX_TIME:-3600}"
        --max-jobs="${QUEUE_WORKER_MAX_JOBS:-1000}"
        --memory="${QUEUE_WORKER_MEMORY:-256}"
        --no-interaction
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[a]rtisan queue:work'"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${WORKER_MEMORY_LIMIT:-384m}
    cpus: ${WORKER_CPU_LIMIT:-1.0}

  scheduler:
    <<: *app-common
    command: ["php", "artisan", "schedule:work", "--no-interaction"]
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -q '[a]rtisan schedule:work'"]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 5
    mem_limit: ${SCHEDULER_MEMORY_LIMIT:-192m}
    cpus: ${SCHEDULER_CPU_LIMIT:-0.50}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-smartbiz}
      POSTGRES_USER: ${DB_USERNAME:-smartbiz}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-smartbiz} -d ${DB_DATABASE:-smartbiz}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-768m}
    cpus: ${POSTGRES_CPU_LIMIT:-1.0}
    shm_size: ${POSTGRES_SHM_SIZE:-256m}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
    command:
      - /bin/sh
      - -lc
      - >-
        exec redis-server
        --requirepass "$$REDIS_PASSWORD"
        --appendonly yes
        --appendfsync everysec
        --maxmemory "$$REDIS_MAXMEMORY"
        --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    mem_limit: ${REDIS_MEMORY_LIMIT:-384m}
    cpus: ${REDIS_CPU_LIMIT:-0.75}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata:
  redisdata:
  app_public_storage:

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
    internal: true
