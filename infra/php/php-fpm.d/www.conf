[www]
user = appuser
group = appuser
listen = 9000
listen.owner = appuser
listen.group = appuser

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

request_terminate_timeout = 65s
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
ping.path = /fpm-ping
pm.status_path = /fpm-status
